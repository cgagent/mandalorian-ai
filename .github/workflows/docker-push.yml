name: Build and Push Docker Image Mandalorian

on:
  push:
    branches:
      - main

env:
  IMAGE_VERSION_MAJOR: 1
  IMAGE_VERSION_MINOR: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: FLY_REGISTRY=${{ env.FLY_REGISTRY_SUBDOMAIN }}
          tags: ${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/${{ github.event.repository.name }}:${{ env.IMAGE_VERSION_MAJOR }}.${{ env.IMAGE_VERSION_MINOR }}.${{ github.run_number }}
